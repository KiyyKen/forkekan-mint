<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Forkekan-mint — Anti Video Burik. 4K kan min!" />
    <title>Forkekan-mint</title>
    <!-- Terapkan class .dark sebelum React mount agar tidak ada flash tema salah.
         Key 'forkekan-theme' harus sama dengan THEME_STORAGE_KEY di stores/theme-store.ts. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('forkekan-theme');
          var theme = stored ? JSON.parse(stored).state.theme : 'system';
          var isDark =
            theme === 'dark' ||
            (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', isDark);
        } catch (error) {
          // Biarkan default terang bila localStorage/JSON gagal dibaca.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
