##
## Forkekan-mint — Full-Stack Development Compose
## Menjalankan seluruh service dalam container:
##
##   docker compose -f infra/compose/docker-compose.dev.yml up --build
##
## Untuk development sehari-hari cukup gunakan docker-compose.yml
## di root (postgres + redis) lalu `pnpm dev`.
##

name: forkekan-mint-dev

services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    environment:
      VITE_API_URL: http://localhost/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      NODE_ENV: development
      API_PORT: 4000
      CORS_ORIGIN: http://localhost
      DATABASE_URL: postgresql://forkekan:forkekan@postgres:5432/forkekan_mint?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-only-secret
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://forkekan:forkekan@postgres:5432/forkekan_mint?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forkekan
      POSTGRES_PASSWORD: forkekan
      POSTGRES_DB: forkekan_mint
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forkekan -d forkekan_mint"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
