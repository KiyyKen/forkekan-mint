##
## Forkekan-mint — Production Compose
## Mengikuti docs/11-deployment.md (Docker Services: frontend, backend,
## worker, postgres, redis, nginx).
##
## Pemakaian (dari root repository):
##   1. cp .env.example .env  →  isi seluruh nilai (lihat DEPLOYMENT.md)
##   2. docker compose -f infra/compose/docker-compose.prod.yml build
##   3. docker compose -f infra/compose/docker-compose.prod.yml run --rm \
##        api pnpm --filter @forkekan/api db:migrate:deploy
##   4. docker compose -f infra/compose/docker-compose.prod.yml run --rm \
##        api pnpm --filter @forkekan/api db:seed
##   5. docker compose -f infra/compose/docker-compose.prod.yml up -d
##
## Storage lokal (UPLOAD_DIR/OUTPUT_DIR) dipakai selama Cloudflare R2 belum
## dikonfigurasi (docs/11 — Persistent Data) — dibagi antara api & worker
## lewat volume `storage_data`.
##
## Terminasi TLS/HTTPS direkomendasikan lewat Coolify (lihat infra/coolify/README.md).
## Bila dijalankan mandiri di VPS, tempatkan reverse proxy TLS lain di depan port 80.
##

name: forkekan-mint

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forkekan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD wajib diisi di .env}
      POSTGRES_DB: ${POSTGRES_DB:-forkekan_mint}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forkekan} -d ${POSTGRES_DB:-forkekan_mint}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-forkekan}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-forkekan_mint}?schema=public
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/storage/uploads
      OUTPUT_DIR: /app/storage/outputs
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-forkekan}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-forkekan_mint}?schema=public
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/storage/uploads
      OUTPUT_DIR: /app/storage/outputs
      # Binary ffmpeg/ffprobe sudah terpasang lewat apk di image worker —
      # jangan bawa path lokal Windows/macOS dari .env pengembang.
      FFMPEG_PATH: ""
      FFPROBE_PATH: ""
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Tambah replika untuk scaling horizontal (docs/11 — Scaling Strategy):
    #   docker compose -f infra/compose/docker-compose.prod.yml up -d --scale worker=3

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ../nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
  storage_data:
