# Forkekan-mint — Nginx Reverse Proxy (production)
# Dipakai oleh infra/compose/docker-compose.prod.yml.
#
# Terminasi TLS/HTTPS direkomendasikan ditangani Coolify (Traefik + Let's
# Encrypt) sesuai docs/11-deployment.md. Bila docker-compose.prod.yml
# dijalankan mandiri di VPS tanpa Coolify, tempatkan reverse proxy/TLS
# terminator lain (mis. Caddy) di depan port 80 ini, atau tambahkan
# konfigurasi `listen 443 ssl` + sertifikat secara terpisah.

events {
  worker_connections 1024;
}

http {
  # Upload video hingga 500 MB (docs/07 — Validation Rules).
  client_max_body_size 500m;

  # Streaming/download video hasil optimasi bisa berlangsung lama.
  proxy_connect_timeout 60s;
  proxy_send_timeout 300s;
  proxy_read_timeout 300s;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json;
  gzip_min_length 1024;

  upstream web {
    server web:3000;
  }

  upstream api {
    server api:4000;
  }

  server {
    listen 80;
    server_name _;

    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
