# Forkekan-mint — Nginx: menyajikan static build React (SPA).
# Dipakai oleh stage `production` pada infra/docker/web.Dockerfile.

server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Asset hashed (Vite) — aman di-cache lama.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA fallback — seluruh route ditangani React Router di client.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri /index.html;
  }
}
